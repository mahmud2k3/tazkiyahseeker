# ===================================================================
#      Tazkiyah Seeker - Final Production Configuration
# ===================================================================

# --- Build Identity ---
# This identifies your app on the phone.
build.application.id=com.tazkiyahseeker.app
build.version.code=1
build.version.name=1.0.0

# --- SDK Settings ---
build.sdk.compile=36
build.sdk.min=26

# --- URL Configuration ---
# Your specific course index page
app.url=https://tazkiyahcenter.shop/course/index.php
app.name=Tazkiyah Seeker

# Offline fallback page
offline.url=file:///android_asset/web/offline.html
# Google Analytics (Optional)
analytics.gtag.id=

# --- Feature Flags ---
# Set to false for the final version to remove debug logs
debug.mode=false

# Crucial for course material uploads
feature.uploads=true
feature.camera.uploads=true
feature.multiple.uploads=true

# Standard user experience features
feature.copy.paste=true
feature.pull.refresh=true
feature.progress.bar=true
feature.zoom=false
feature.save.form=true
feature.open.external.urls=true
feature.chrome.tabs=true

# --- Behavior ---
# Back button navigates through website history
behavior.back.exits=false
feature.exit.dialog=true

# --- Permissions ---
# Asks for notification permission on first launch
permissions.on.launch=NOTIFICATIONS

# --- Security ---
# IMPORTANT: Allows Moodle/PHP login cookies to stay active
security.verify.ssl=true
security.accept.thirdparty.cookies=true
security.block.screenshots=false

# --- UI & Theme ---
# 1 = Force Portrait (best for phones)
ui.orientation=1
# 0 = Fullscreen WebView
ui.layout=0
# Show your splash screen while the site loads
ui.splash.extend=true

# --- Push Notifications (OneSignal) ---
# Your verified OneSignal App ID
onesignal.id=8adbca05-93b0-44a0-ba60-b078304a6d1c

# --- Plugins ---
# Core plugins enabled, playground disabled for a clean app
plugins.enabled=RatingPlugin,LocationPlugin,DialogPlugin,ToastPlugin
plugins.playground.enabled=false
